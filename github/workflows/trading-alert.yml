name: Trading Alert

on:
  schedule:
    - cron: "5 21 * * 1-5"
  workflow_dispatch: {}

jobs:
  check-signal:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ticker: ["EURUSD=X", "GC=F", "BTC-USD"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check signal and notify
        run: |
          python main.py alert --ticker "${{ matrix.ticker }}" --ntfy-topic "rilleyfx200913"
